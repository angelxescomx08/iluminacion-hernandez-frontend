name: Deploy Frontend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. PRUEBA DE CONEXIÓN
      - name: Test SSH Connection
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=10 ec2-user@${{ secrets.EC2_HOST }} "echo '✅ CONEXIÓN OK' && node -v"

      # 2. CONFIGURACIÓN DE PNPM (CORREGIDO)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # Especificamos la versión mayor 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # 3. CONSTRUCCIÓN
      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
        env:
          PUBLIC_API_URL: https://api.iluminacion-hernandez.com

      # 4. EMPAQUETADO Y ENVÍO
      - name: Native Deploy (SCP)
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Astro genera el build en 'dist'
          tar -czf deploy_frontend.tar.gz dist package.json pnpm-lock.yaml
          
          # Subimos a la carpeta del frontend en ec2-user
          scp -i ~/.ssh/id_rsa deploy_frontend.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/apps/frontend/

      # 5. COMANDOS REMOTOS
      - name: Remote Commands
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            # Cargamos el PATH de ec2-user
            export PNPM_HOME="/home/ec2-user/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            
            cd /home/ec2-user/apps/frontend
            
            # Extraer y limpiar
            tar -xzf deploy_frontend.tar.gz
            rm deploy_frontend.tar.gz
            
            # Instalar dependencias de producción
            pnpm install --prod --no-frozen-lockfile
            
            echo "--- Reiniciando Astro con PM2 ---"
            # Astro con adaptador Node usa dist/server/entry.mjs
            pm2 restart astro-front || PORT=4321 pm2 start dist/server/entry.mjs --name "astro-front"
            
            pm2 save
          EOF